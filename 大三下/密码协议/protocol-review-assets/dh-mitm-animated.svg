<svg xmlns="http://www.w3.org/2000/svg" width="920" height="390" viewBox="0 0 920 390" role="img" aria-label="Diffie-Hellman 中间人攻击动画">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .actor { fill: #f8fafc; stroke: #334155; stroke-width: 2; }
      .attacker { fill: #fff7ed; stroke: #c2410c; stroke-width: 2.5; }
      .line { stroke: #475569; stroke-width: 2.2; marker-end: url(#arrow); fill: none; }
      .bad { stroke: #ea580c; stroke-width: 2.8; marker-end: url(#arrow); fill: none; }
      .note { fill: #334155; font-size: 15px; }
      .label { font-size: 20px; font-weight: 700; }
      .small { font-size: 14px; }
    </style>
  </defs>

  <rect x="0" y="0" width="920" height="390" fill="#ffffff"/>
  <text x="460" y="36" text-anchor="middle" font-size="26" font-weight="700">Diffie-Hellman 中间人攻击：临时公钥被替换</text>
  <text x="460" y="62" text-anchor="middle" class="note">动画循环顺序：Alice 发出 gˣ，Eva 替换为 gᶻ；Bob 发出 gʸ，Eva 替换为 gᶻ</text>

  <rect class="actor" x="55" y="95" width="155" height="220" rx="8"/>
  <text class="label" x="132" y="128" text-anchor="middle">Alice</text>
  <text class="small" x="132" y="156" text-anchor="middle">选择 x</text>
  <text class="small" x="132" y="178" text-anchor="middle">发送 gˣ</text>
  <text class="small" x="132" y="252" text-anchor="middle">收到 gᶻ</text>
  <text class="small" x="132" y="274" text-anchor="middle">密钥 gˣᶻ</text>

  <rect class="attacker" x="382" y="95" width="155" height="220" rx="8"/>
  <text class="label" x="460" y="128" text-anchor="middle" fill="#9a3412">Eva</text>
  <text class="small" x="460" y="156" text-anchor="middle">选择 z</text>
  <text class="small" x="460" y="178" text-anchor="middle">替换双方消息</text>
  <text class="small" x="460" y="252" text-anchor="middle">与 Alice: gˣᶻ</text>
  <text class="small" x="460" y="274" text-anchor="middle">与 Bob: gʸᶻ</text>

  <rect class="actor" x="710" y="95" width="155" height="220" rx="8"/>
  <text class="label" x="788" y="128" text-anchor="middle">Bob</text>
  <text class="small" x="788" y="156" text-anchor="middle">选择 y</text>
  <text class="small" x="788" y="178" text-anchor="middle">收到 gᶻ</text>
  <text class="small" x="788" y="252" text-anchor="middle">发送 gʸ</text>
  <text class="small" x="788" y="274" text-anchor="middle">密钥 gʸᶻ</text>

  <path class="line" d="M210 142 L382 142"/>
  <text class="small" x="296" y="132" text-anchor="middle">1. gˣ</text>
  <path class="bad" d="M537 172 L710 172"/>
  <text class="small" x="624" y="162" text-anchor="middle" fill="#9a3412">2. gᶻ</text>
  <path class="line" d="M710 244 L537 244"/>
  <text class="small" x="624" y="234" text-anchor="middle">3. gʸ</text>
  <path class="bad" d="M382 274 L210 274"/>
  <text class="small" x="296" y="264" text-anchor="middle" fill="#9a3412">4. gᶻ</text>

  <circle r="8" fill="#2563eb" opacity="0">
    <animate attributeName="cx" values="210;210;382;382;382;382;382;382;382" keyTimes="0;0.03;0.21;0.22;0.25;0.45;0.70;0.99;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="142;142;142;142;142;142;142;142;142" keyTimes="0;0.03;0.21;0.22;0.25;0.45;0.70;0.99;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0;0;0;0;0;0" keyTimes="0;0.03;0.21;0.22;0.25;0.45;0.70;0.99;1" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle r="8" fill="#ea580c" opacity="0">
    <animate attributeName="cx" values="537;537;537;710;710;710;710;710;710" keyTimes="0;0.22;0.27;0.45;0.46;0.70;0.99;1;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="172;172;172;172;172;172;172;172;172" keyTimes="0;0.22;0.27;0.45;0.46;0.70;0.99;1;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;1;0;0;0;0;0" keyTimes="0;0.22;0.27;0.45;0.46;0.70;0.99;1;1" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle r="8" fill="#16a34a" opacity="0">
    <animate attributeName="cx" values="710;710;710;710;537;537;537;537;537" keyTimes="0;0.45;0.50;0.68;0.86;0.87;0.99;1;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="244;244;244;244;244;244;244;244;244" keyTimes="0;0.45;0.50;0.68;0.86;0.87;0.99;1;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;1;0;0;0;0;0" keyTimes="0;0.45;0.50;0.68;0.86;0.87;0.99;1;1" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle r="8" fill="#ea580c" opacity="0">
    <animate attributeName="cx" values="382;382;382;382;382;210;210;210;210" keyTimes="0;0.68;0.72;0.74;0.78;0.96;0.97;0.99;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="274;274;274;274;274;274;274;274;274" keyTimes="0;0.68;0.72;0.74;0.78;0.96;0.97;0.99;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0;1;1;1;0;0;0" keyTimes="0;0.68;0.72;0.74;0.78;0.96;0.97;0.99;1" dur="8s" repeatCount="indefinite"/>
  </circle>

  <rect x="210" y="330" width="500" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="460" y="353" text-anchor="middle" class="note">结论：基础 DH 只协商密钥，不认证对方身份；应加入签名/MAC/身份绑定。</text>
</svg>
